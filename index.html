<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="screen-orientation" content="landscape">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#FF6B35">
  <link rel="manifest" href="manifest.json">
  <meta name="robots" content="noindex">
  <link rel="icon" href="assets/icon.png" type="image/svg+xml">
  <title>Puzzle Fun! 🧩</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #FFF9F0;
      --primary:   #FF6B35;
      --secondary: #4ECDC4;
      --accent:    #FFE66D;
      --dark:      #2D3142;
      --tray-bg:   #FFF0E6;
      --radius:    18px;
      --header-h:  52px;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body { pointer-events: none; }
    body * { pointer-events: auto; }

    /* ============================================================
       SCREENS
    ============================================================ */
    .screen {
      position: absolute; inset: 0;
      display: none;
    }
    .screen.active { display: flex; }

    /* ============================================================
       MENU SCREEN
    ============================================================ */
    #menu-screen {
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 16px 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(255,107,53,.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(78,205,196,.12) 0%, transparent 60%),
        var(--bg);
    }

    #puzzle-gallery {
      display: flex;
      flex-wrap: nowrap;
      gap: 16px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 14px 20px;
      justify-content: flex-start;
      align-items: stretch;
      width: 100%;
      flex: 1;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
    }
    #puzzle-gallery::-webkit-scrollbar { height: 6px; }
    #puzzle-gallery::-webkit-scrollbar-track { background: rgba(0,0,0,.1); border-radius: 3px; }
    #puzzle-gallery::-webkit-scrollbar-thumb { background: rgba(255,107,53,.4); border-radius: 3px; }

    .puzzle-card {
      flex: 0 0 auto;
      width: clamp(140px, 20vw, 220px);
      height: 100%;
      display: flex;
      flex-direction: column;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      background: white;
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
      transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
      border: 3px solid transparent;
      scroll-snap-align: center;
    }
    .puzzle-card:hover  { transform: scale(1.05); box-shadow: 0 12px 32px rgba(0,0,0,.18); }
    .puzzle-card:active { transform: scale(.97); }

    .puzzle-card img {
      width: 100%;
      flex: 1;
      min-height: 0;
      aspect-ratio: 1/1;
      object-fit: cover; display: block;
    }


    /* ============================================================
       GAME SCREEN
    ============================================================ */
    #game-screen {
      flex-direction: column;
      background:
        radial-gradient(ellipse at 0% 100%, rgba(255,107,53,.08) 0%, transparent 50%),
        var(--bg);
    }

     /* --- Fixed Header Elements --- */
    #back-btn {
      position: fixed;
      top: 10px;
      left: 14px;
      display: flex; align-items: center; gap: 6px;
      background: var(--primary);
      color: white; border: none; border-radius: 12px;
      padding: 6px 14px;
      font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(255,107,53,.4);
      transition: transform .15s, box-shadow .15s;
      z-index: 100;
    }
    #back-btn:active { transform: scale(.93); box-shadow: none; }

    #progress-wrap {
      position: fixed;
      top: 10px;
      right: 14px;
      display: flex; align-items: center; gap: 8px;
      z-index: 100;
    }
    #progress-label {
      font-size: 13px; font-weight: 800; color: var(--secondary);
      white-space: nowrap;
    }
    #progress-bar-track {
      width: 80px; height: 10px;
      background: rgba(78,205,196,.2);
      border-radius: 10px; overflow: hidden;
    }
    #progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--secondary), #26A69A);
      border-radius: 10px;
      width: 0%;
      transition: width .4s cubic-bezier(.34,1.56,.64,1);
    }

    /* --- Game Area --- */
    #game-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    /* --- Board Area --- */
    #board-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      position: relative;
      height: 100%;
    }

    #puzzle-board {
      position: absolute;
      border-radius: 14px;
      box-shadow:
        0 0 0 3px rgba(78,205,196,.35),
        0 10px 40px rgba(0,0,0,.15);
      background: #E8F8F5;
      overflow: visible;
      flex-shrink: 0;
    }

    /* Slot ghost outlines */
    .board-slot {
      position: absolute;
      border: 2px dashed rgba(78,205,196,.45);
      background: rgba(78,205,196,.07);
      border-radius: 6px;
      pointer-events: none;
      transition: background .3s, border-color .3s;
    }
    .board-slot.filled {
      background: transparent;
      border-color: transparent;
    }

    /* Ghost image overlay */
    #ghost-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; border-radius: 12px;
      opacity: .1; pointer-events: none;
      user-select: none;
    }

    /* ============================================================
       PUZZLE PIECES
    ============================================================ */
    .puzzle-piece {
      position: absolute;
      cursor: grab;
      touch-action: none;
      user-select: none;
      will-change: transform, left, top;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,.22));
      transition: filter .2s;
    }
    .puzzle-piece canvas { 
      display: block; 
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .puzzle-piece.dragging {
      cursor: grabbing;
      filter: drop-shadow(0 10px 24px rgba(0,0,0,.38));
      z-index: 1000 !important;
    }
    .puzzle-piece.placed {
      cursor: default;
      filter: drop-shadow(0 2px 5px rgba(0,0,0,.12));
    }
    .puzzle-piece.snapping {
      transition:
        left .22s cubic-bezier(.34,1.56,.64,1),
        top  .22s cubic-bezier(.34,1.56,.64,1),
        transform .22s cubic-bezier(.34,1.56,.64,1),
        filter .2s;
    }

    /* ============================================================
       CONFETTI CANVAS
    ============================================================ */
    #confetti-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 9999;
    }

    /* ============================================================
       WIN OVERLAY
    ============================================================ */
    #win-overlay {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: transparent;
      display: none; align-items: center; justify-content: center;
      z-index: 9998;
      padding: 20px;
    }
    #win-overlay.show { display: flex; }

    #win-card {
      border-radius: 28px;
      padding: 24px 40px;
      text-align: center;
      animation: slideUp .45s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    #win-card .win-emoji { font-size: 40px; display: block; margin-bottom: 4px; }
    #win-card h2 {
      font-size: clamp(18px, 4vw, 28px); font-weight: 900;
      color: var(--dark); margin-bottom: 16px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .win-btns { display: flex; gap: 12px; justify-content: center; }
    .win-btn {
      border: none; border-radius: 14px;
      padding: 11px 26px;
      font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800;
      color: white; cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 14px rgba(0,0,0,.15);
    }
    .win-btn:active { transform: scale(.93); box-shadow: none; }
    .win-btn.orange { background: linear-gradient(135deg, var(--primary), #FF8C42); }
    .win-btn.teal   { background: linear-gradient(135deg, var(--secondary), #26A69A); }

    /* ============================================================
       STAR BURST
    ============================================================ */
    .star-burst {
      position: fixed; pointer-events: none; font-size: 22px;
      animation: starPop .55s ease-out forwards;
      z-index: 9997; will-change: transform, opacity;
    }
    @keyframes starPop {
      0%   { transform: scale(0) translateY(0); opacity: 1; }
      60%  { transform: scale(1.4) translateY(-20px); opacity: 1; }
      100% { transform: scale(0) translateY(-40px); opacity: 0; }
    }

    /* ============================================================
       LOADING SPINNER
    ============================================================ */
    #loading-overlay {
      position: absolute; inset: 0;
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      background: rgba(255,249,240,.85);
      z-index: 500; border-radius: 14px;
    }
    #loading-overlay.show { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,107,53,.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: rotate .8s linear infinite;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }
    #loading-overlay p { font-size: 14px; font-weight: 700; color: var(--dark); }
  </style>
</head>
<body>

<!-- ============================================================
     PORTRAIT WARNING
============================================================ -->
<div id="portrait-warning">
  <div class="rotate-icon">📱</div>
  <p>Поверни устройство<br>горизонтально</p>
</div>

<!-- ============================================================
     MENU SCREEN
============================================================ -->
<div id="menu-screen" class="screen active">
  <div id="puzzle-gallery"></div>
</div>

<!-- ============================================================
     GAME SCREEN
============================================================ -->
<div id="game-screen" class="screen">
  <button id="back-btn">← Назад</button>

  <div id="progress-wrap">
    <span id="progress-label">0 / 9</span>
    <div id="progress-bar-track">
      <div id="progress-bar-fill"></div>
    </div>
  </div>

  <div id="game-area">
    <div id="board-area">
      <div id="puzzle-board">
        <img id="ghost-img" alt="">
      </div>
      <div id="loading-overlay">
        <div class="spinner"></div>
        <p>Загружаем картинку…</p>
      </div>
    </div>
  </div>
</div>

<!-- Confetti canvas -->
<canvas id="confetti-canvas"></canvas>

<!-- Win overlay -->
<div id="win-overlay">
  <div id="win-card">
    <div class="win-btns">
      <button class="win-btn orange" id="btn-again">Ещё раз!</button>
      <button class="win-btn teal"   id="btn-menu">Меню</button>
    </div>
  </div>
</div>

<!-- ============================================================
     JAVASCRIPT
============================================================ -->
<script>
'use strict';

/* ============================================================
   PUZZLE DEFINITIONS
============================================================ */
const PUZZLES = [
  { name: '🦇 Бэтмен',       url: 'assets/batman.jpg',         seed: 42  },
  { name: '🕷️ Человек-паук', url: 'assets/spider-man.jpg',      seed: 73  },
  { name: '🤖 Железный',     url: 'assets/iron-man.jpg',        seed: 99  },
  { name: '🛡️ Капитан',     url: 'assets/capitan-america.jpg', seed: 15  },
  { name: '💪 Халк',         url: 'assets/hulk.jpg',            seed: 57  },
  { name: '🦠 Веном',       url: 'assets/venom.jpg',          seed: 31  },
  { name: '🔴 Дэдпул',      url: 'assets/deadpool.jpg',        seed: 88  },
  { name: '✨ Стрэндж',     url: 'assets/dr-strendj.jpg',      seed: 55  },
  { name: '💜 Танос',        url: 'assets/tanos.jpg',           seed: 77  },
];

const COLS   = 3;
const ROWS   = 3;
const TOTAL  = COLS * ROWS;
const SNAP   = 34; // px snap radius

/* ============================================================
   SEEDED PRNG  (LCG)
============================================================ */
function makeRng(seed) {
  let s = (seed >>> 0) || 1;
  return () => {
    s = (Math.imul(1664525, s) + 1013904223) >>> 0;
    return s / 0x100000000;
  };
}

/* ============================================================
   GENERATE TAB DIRECTIONS
   tabs[row][col] = { top, right, bottom, left }
   +1 = outward tab, -1 = inward blank, 0 = straight edge
============================================================ */
function generateTabs(seed) {
  const rng  = makeRng(seed);
  const tabs = Array.from({ length: ROWS }, () =>
    Array.from({ length: COLS }, () => ({}))
  );

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      tabs[r][c].top    = r === 0        ? 0 : -tabs[r - 1][c].bottom;
      tabs[r][c].left   = c === 0        ? 0 : -tabs[r][c - 1].right;
      tabs[r][c].right  = c === COLS - 1 ? 0 : (rng() > 0.5 ? 1 : -1);
      tabs[r][c].bottom = r === ROWS - 1 ? 0 : (rng() > 0.5 ? 1 : -1);
    }
  }
  return tabs;
}

/* ============================================================
   BEZIER PATH HELPERS
   hTab: horizontal side  (x1,y) → (x2,y),  tab bump by dy
   vTab: vertical side    (x,y1) → (x,y2),  tab bump by dx
============================================================ */
function hTab(ctx, x1, x2, y, dy) {
  if (!dy) { ctx.lineTo(x2, y); return; }
  const w   = Math.abs(x2 - x1);
  const dir = x2 > x1 ? 1 : -1;
  const mx  = (x1 + x2) * 0.5;
  ctx.lineTo(x1 + dir * w * 0.35, y);
  ctx.bezierCurveTo(
    x1 + dir * w * 0.35, y + dy * 0.5,
    mx  - dir * w * 0.10, y + dy,
    mx, y + dy
  );
  ctx.bezierCurveTo(
    mx  + dir * w * 0.10, y + dy,
    x1 + dir * w * 0.65, y + dy * 0.5,
    x1 + dir * w * 0.65, y
  );
  ctx.lineTo(x2, y);
}

function vTab(ctx, x, y1, y2, dx) {
  if (!dx) { ctx.lineTo(x, y2); return; }
  const h   = Math.abs(y2 - y1);
  const dir = y2 > y1 ? 1 : -1;
  const my  = (y1 + y2) * 0.5;
  ctx.lineTo(x, y1 + dir * h * 0.35);
  ctx.bezierCurveTo(
    x + dx * 0.5, y1 + dir * h * 0.35,
    x + dx, my  - dir * h * 0.10,
    x + dx, my
  );
  ctx.bezierCurveTo(
    x + dx, my  + dir * h * 0.10,
    x + dx * 0.5, y1 + dir * h * 0.65,
    x, y1 + dir * h * 0.65
  );
  ctx.lineTo(x, y2);
}

/* Build the full closed path for one puzzle piece.
   (px,py) = top-left of cell area within the piece canvas,
   (cw,ch) = cell dimensions, t = tab protrusion */
function buildPiecePath(ctx, px, py, cw, ch, tabs, t) {
  ctx.beginPath();
  ctx.moveTo(px, py);
  // TOP    left→right  outward = UP   (negative y)
  hTab(ctx, px,    px + cw, py,      tabs.top    ? -tabs.top    * t : 0);
  // RIGHT  top→bottom  outward = RIGHT (positive x)
  vTab(ctx, px+cw, py,    py + ch,   tabs.right  ?  tabs.right  * t : 0);
  // BOTTOM right→left  outward = DOWN  (positive y)
  hTab(ctx, px+cw, px,    py + ch,   tabs.bottom ?  tabs.bottom * t : 0);
  // LEFT   bottom→top  outward = LEFT  (negative x)
  vTab(ctx, px,    py+ch, py,        tabs.left   ? -tabs.left   * t : 0);
  ctx.closePath();
}

/* ============================================================
   CREATE PIECE CANVAS
   Returns a <canvas> element showing the clipped image fragment.
============================================================ */
function createPieceCanvas(img, col, row, cw, ch, tabSz, tabs) {
  const PAD = tabSz;                         // padding = tabSize
  const pw  = Math.ceil(cw + PAD * 2);
  const ph  = Math.ceil(ch + PAD * 2);
  const canvas = document.createElement('canvas');
  canvas.width  = pw;
  canvas.height = ph;
  const ctx = canvas.getContext('2d');

  const px = PAD, py = PAD;                  // cell origin inside canvas
  const t  = tabSz * 0.88;                   // actual protrusion (slightly less than padding)

  // 1. Build + apply clip
  buildPiecePath(ctx, px, py, cw, ch, tabs, t);
  ctx.save();
  ctx.clip();

  // 2. Draw the full image so that the relevant cell aligns with (px, py)
  ctx.drawImage(img, -col * cw + PAD, -row * ch + PAD, cw * COLS, ch * ROWS);
  ctx.restore();

  return canvas;
}

/* ============================================================
   GAME STATE
============================================================ */
const state = {
  puzzleIdx: 0,
  pieces:     [],     // [{el, canvas, col, row, x, y, placed}]
  placed:     0,
  tabSz:      0,
  cellW:      0,
  cellH:      0,
  boardRect:  null,  // {left,top,width,height} relative to #game-area
};

let activeDrag = null; // {piece, offX, offY, gaRect}

/* ============================================================
   SCREEN NAVIGATION
============================================================ */
function showMenu() {
  document.getElementById('menu-screen').classList.add('active');
  document.getElementById('game-screen').classList.remove('active');
  stopConfetti();
  document.getElementById('win-overlay').classList.remove('show');
  clearGameArea();
}

function clearGameArea() {
  document.querySelectorAll('.puzzle-piece').forEach(e => e.remove());
  document.getElementById('puzzle-board').querySelectorAll('.board-slot').forEach(e => e.remove());
  state.pieces  = [];
  state.placed  = 0;
  activeDrag    = null;
}

/* ============================================================
   GALLERY
============================================================ */
function initGallery() {
  const gallery = document.getElementById('puzzle-gallery');
  PUZZLES.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'puzzle-card';
    card.innerHTML = `
      <img src="${p.url}" loading="lazy" alt="${p.name}">

    `;
    
    let startX = 0, startY = 0;
    
    card.addEventListener('pointerdown', e => {
      startX = e.clientX;
      startY = e.clientY;
    });
    
    card.addEventListener('pointerup', e => {
      const dx = Math.abs(e.clientX - startX);
      const dy = Math.abs(e.clientY - startY);
      if (dx < 10 && dy < 10) {
        startGame(i);
      }
    });
    
    gallery.appendChild(card);
  });
}

/* ============================================================
   START GAME
============================================================ */
function startGame(idx) {
  state.puzzleIdx = idx;
  clearGameArea();

  document.getElementById('menu-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');


  updateProgress(0);

  // Show loading
  const loadOverlay = document.getElementById('loading-overlay');
  loadOverlay.classList.add('show');

  const img = new Image();
  img.onload  = () => { loadOverlay.classList.remove('show'); buildPuzzle(img); };
  img.onerror = () => { loadOverlay.classList.remove('show'); alert('Не удалось загрузить картинку. Проверь интернет-соединение.'); };
  img.src = PUZZLES[idx].url;
}

/* ============================================================
   BUILD PUZZLE
============================================================ */
function buildPuzzle(img) {
  const boardArea   = document.getElementById('board-area');
  const gameArea    = document.getElementById('game-area');
  const board       = document.getElementById('puzzle-board');
  const ghostImg    = document.getElementById('ghost-img');

  // ---- Calculate board size ---------------------------------
  const areaW = boardArea.clientWidth  - 28;
  const areaH = boardArea.clientHeight - 28;
  const size  = Math.min(areaW, areaH, 500);

  board.style.width  = size + 'px';
  board.style.height = size + 'px';

  const cw  = size / COLS;
  const ch  = size / ROWS;
  const tsz = Math.round(Math.min(cw, ch) * 0.22);

  state.cellW = cw;
  state.cellH = ch;
  state.tabSz = tsz;

  // ---- Ghost image ------------------------------------------
  ghostImg.src = PUZZLES[state.puzzleIdx].url;

  // ---- Slots ------------------------------------------------
  board.querySelectorAll('.board-slot').forEach(e => e.remove());
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const slot = document.createElement('div');
      slot.className  = 'board-slot';
      slot.id         = `slot-${r}-${c}`;
      slot.style.left = (c * cw) + 'px';
      slot.style.top  = (r * ch) + 'px';
      slot.style.width  = cw + 'px';
      slot.style.height = ch + 'px';
      board.appendChild(slot);
    }
  }

  // ---- Generate tabs ----------------------------------------
  const tabs = generateTabs(PUZZLES[state.puzzleIdx].seed);
  const rng  = makeRng(PUZZLES[state.puzzleIdx].seed + 9999);

  // ---- Wait for layout, then measure & spawn pieces ---------
  requestAnimationFrame(() => {
    const gaRect = gameArea.getBoundingClientRect();
    const bRect  = board.getBoundingClientRect();

    state.boardRect = {
      left:   bRect.left   - gaRect.left,
      top:    bRect.top    - gaRect.top,
      width:  size,
      height: size,
    };

    // Build and scatter pieces randomly in game area (not touching board)
    const pieceW = Math.ceil(cw + tsz * 2);
    const pieceH = Math.ceil(ch + tsz * 2);

    const gaW = gaRect.width;
    const gaH = gaRect.height;
    const boardX = bRect.left - gaRect.left;
    const boardY = bRect.top - gaRect.top;
    const margin = 10;
    const boardBuffer = 20;

    // Calculate safe zones (areas not overlapping with board)
    const safeZones = [
      // Left of board
      { x: margin, y: margin, w: boardX - pieceW - margin * 2 - boardBuffer, h: gaH - margin * 2 },
      // Right of board  
      { x: boardX + size + margin + boardBuffer, y: margin, w: gaW - boardX - size - margin * 2 - boardBuffer, h: gaH - margin * 2 },
      // Above board
      { x: margin, y: margin, w: gaW - margin * 2, h: boardY - pieceH - margin * 2 - boardBuffer },
      // Below board
      { x: margin, y: boardY + size + margin + boardBuffer, w: gaW - margin * 2, h: gaH - boardY - size - margin * 2 - boardBuffer },
    ].filter(z => z.w > pieceW && z.h > pieceH);

    // Generate random positions in safe zones
    const positions = [];
    const overflow = 30;
    for (let i = 0; i < TOTAL; i++) {
      const zone = safeZones[Math.floor(rng() * safeZones.length)];
      const x = zone.x + rng() * Math.max(0, zone.w - pieceW);
      const y = zone.y + rng() * Math.max(0, zone.h - pieceH);
      positions.push({ x, y });
    }

    // Shuffle order for pieces
    const order = Array.from({ length: TOTAL }, (_, i) => i).sort(() => rng() - 0.5);

    order.forEach((idx, i) => {
      const col = idx % COLS;
      const row = Math.floor(idx / COLS);

      const pc = createPieceCanvas(img, col, row, cw, ch, tsz, tabs[row][col]);

      const el = document.createElement('div');
      el.className = 'puzzle-piece';
      el.appendChild(pc);
      el.style.width  = pieceW + 'px';
      el.style.height = pieceH + 'px';

      const pos = positions[i];
      
      const sx = pos.x;
      const sy = pos.y;

      el.style.left      = sx + 'px';
      el.style.top       = sy + 'px';
      el.style.zIndex    = 20 + i;

      const piece = { el, col, row, x: sx, y: sy, placed: false };
      state.pieces.push(piece);
      gameArea.appendChild(el);

      el.addEventListener('pointerdown', e => onDown(e, piece));
    });
  });
}

/* ============================================================
   DRAG  –  POINTER DOWN
============================================================ */
function onDown(e, piece) {
  if (piece.placed) return;
  e.preventDefault();
  e.stopPropagation();

  const el     = piece.el;
  const gaRect = document.getElementById('game-area').getBoundingClientRect();
  const elRect = el.getBoundingClientRect();

  const offX = e.clientX - elRect.left;
  const offY = e.clientY - elRect.top;

  el.setPointerCapture(e.pointerId);
  el.classList.add('dragging');
  el.style.zIndex    = 1000;

  activeDrag = { piece, offX, offY, gaRect };

  el.addEventListener('pointermove', onMove);
  el.addEventListener('pointerup',   onUp);
  el.addEventListener('pointercancel', onUp);
}

/* ============================================================
   DRAG  –  POINTER MOVE
============================================================ */
function onMove(e) {
  if (!activeDrag) return;
  e.preventDefault();

  const { piece, offX, offY, gaRect } = activeDrag;
  const el = piece.el;
  const overflow = 40;

  const x = Math.max(-overflow, Math.min(e.clientX - gaRect.left - offX, gaRect.width - el.offsetWidth + overflow));
  const y = Math.max(-overflow, Math.min(e.clientY - gaRect.top - offY, gaRect.height - el.offsetHeight + overflow));

  piece.x = x;
  piece.y = y;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
}

/* ============================================================
   DRAG  –  POINTER UP
============================================================ */
function onUp(e) {
  if (!activeDrag) return;
  e.preventDefault();

  const { piece } = activeDrag;
  const el = piece.el;

  el.classList.remove('dragging');
  el.releasePointerCapture(e.pointerId);
  el.removeEventListener('pointermove', onMove);
  el.removeEventListener('pointerup',   onUp);
  el.removeEventListener('pointercancel', onUp);

  activeDrag = null;

  el.style.transform = 'rotate(0deg) scale(1)';
  checkSnap(piece);
}

/* ============================================================
   SNAP LOGIC
============================================================ */
function checkSnap(piece) {
  if (piece.placed) return;

  const { boardRect, cellW, cellH, tabSz } = state;

  // Target = top-left of piece canvas when perfectly placed
  const tx = boardRect.left + piece.col * cellW - tabSz;
  const ty = boardRect.top  + piece.row * cellH - tabSz;

  const dx = Math.abs(piece.x - tx);
  const dy = Math.abs(piece.y - ty);

  if (dx < SNAP && dy < SNAP) {
    // ---- SNAP! ------------------------------------------------
    piece.placed = true;
    state.placed++;

    const el = piece.el;
    el.classList.add('snapping', 'placed');
    el.style.left      = tx + 'px';
    el.style.top       = ty + 'px';
    el.style.zIndex    = 5;


    // Mark slot filled
    const slot = document.getElementById(`slot-${piece.row}-${piece.col}`);
    if (slot) slot.classList.add('filled');

    // Cleanup transition class
    el.addEventListener('transitionend', () => el.classList.remove('snapping'), { once: true });

    playSnapSound();
    spawnStars(el);
    updateProgress(state.placed);

    if (state.placed === TOTAL) setTimeout(onWin, 350);
  } else {
    // Return small bounce
    piece.el.style.transition = 'transform .15s';
    piece.el.style.transform  = 'rotate(0deg) scale(1)';
    setTimeout(() => { piece.el.style.transition = ''; }, 200);
  }
}

/* ============================================================
   WIN
============================================================ */
function onWin() {
  playSuccessSound();
  startConfetti();
  document.getElementById('win-overlay').classList.add('show');
}

/* ============================================================
   PROGRESS
============================================================ */
function updateProgress(n) {
  document.getElementById('progress-label').textContent = `${n} / ${TOTAL}`;
  document.getElementById('progress-bar-fill').style.width = (n / TOTAL * 100) + '%';
}

/* ============================================================
   STARS
============================================================ */
function spawnStars(el) {
  const rect = el.getBoundingClientRect();
  const cx   = rect.left + rect.width  * 0.5;
  const cy   = rect.top  + rect.height * 0.5;
  const emojis = ['⭐', '✨', '🌟', '💫'];

  emojis.forEach((em, i) => {
    const s = document.createElement('div');
    s.className = 'star-burst';
    s.textContent = em;
    s.style.left  = (cx - 11 + (i - 1.5) * 22) + 'px';
    s.style.top   = (cy - 11) + 'px';
    s.style.animationDelay = (i * 0.06) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 700);
  });
}

/* ============================================================
   AUDIO  (Web Audio API – no external files)
============================================================ */
let _audioCtx = null;
function audioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}

function playSnapSound() {
  try {
    const ac = audioCtx();
    if (ac.state === 'suspended') ac.resume();
    const osc  = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(520, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(880, ac.currentTime + 0.07);
    gain.gain.setValueAtTime(0.22, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.14);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + 0.14);
  } catch (_) {}
}

function playSuccessSound() {
  // Ascending arpeggio  C5 – E5 – G5 – C6
  const freqs = [523.25, 659.25, 783.99, 1046.50];
  try {
    const ac = audioCtx();
    if (ac.state === 'suspended') ac.resume();
    freqs.forEach((f, i) => {
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sine';
      const t = ac.currentTime + i * 0.14;
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.28, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      osc.start(t); osc.stop(t + 0.45);
    });
  } catch (_) {}
}

/* ============================================================
   CONFETTI
============================================================ */
const CONF_COLORS = ['#FF6B35','#4ECDC4','#FFE66D','#FF4081','#69F0AE','#448AFF','#E040FB'];
let confRAF = null;
let confParts = [];

function startConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  confParts = [];
  for (let i = 0; i < 140; i++) {
    confParts.push({
      x:    Math.random() * canvas.width,
      y:    -10 - Math.random() * 200,
      vx:   (Math.random() - 0.5) * 5,
      vy:   1.5 + Math.random() * 4,
      sz:   5 + Math.random() * 9,
      rot:  Math.random() * Math.PI * 2,
      rs:   (Math.random() - 0.5) * 0.25,
      col:  CONF_COLORS[Math.floor(Math.random() * CONF_COLORS.length)],
      rect: Math.random() > 0.45,
    });
  }

  if (confRAF) cancelAnimationFrame(confRAF);

  const frame = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    confParts.forEach(p => {
      p.x   += p.vx;
      p.y   += p.vy;
      p.vy  += 0.06;
      p.vx  += (Math.random() - 0.5) * 0.1;
      p.rot += p.rs;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.col;
      if (p.rect) ctx.fillRect(-p.sz * 0.5, -p.sz * 0.25, p.sz, p.sz * 0.5);
      else {
        ctx.beginPath();
        ctx.arc(0, 0, p.sz * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    });

    confParts = confParts.filter(p => p.y < canvas.height + 60);
    if (confParts.length) confRAF = requestAnimationFrame(frame);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  };

  confRAF = requestAnimationFrame(frame);
  setTimeout(stopConfetti, 5500);
}

function stopConfetti() {
  if (confRAF) { cancelAnimationFrame(confRAF); confRAF = null; }
  confParts = [];
  const canvas = document.getElementById('confetti-canvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}
